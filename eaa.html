<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAA</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #808080;
            color: #111;
        }

        h2 {
            text-align: center;
            padding: 20px 0;
        }

        .navbar {
            background: #232f3e;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
        }

        .back-btn {
            color: #ff9900;
            text-decoration: none;
            font-size: 24px;
            margin-right: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        /* Responsive Grid */
        @media (max-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        /* List View Styles */
        .grid.list-view {
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
        }

        .grid.list-view .product-card {
            display: flex;
            flex-direction: row;
            align-items: center;
            text-align: left;
            padding: 20px;
            margin-bottom: 15px;
        }

        .grid.list-view .product-card img {
            width: 180px;
            height: 180px;
            margin-right: 25px;
            margin-bottom: 0;
        }

        .grid.list-view .product-card .product-info {
            flex: 1;
        }

        .grid.list-view .product-card button {
            width: auto;
            min-width: 120px;
            margin-right: 10px;
        }

        /* Controls Bar */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: #fff;
            margin: 10px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            background: #f5f5f5;
            border: 1px solid #ddd;
            color: #333;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.2s;
            width: auto;
        }

        .icon-btn:hover {
            background: #eee;
            border-color: #bbb;
        }

        .icon-btn i {
            width: 18px;
            height: 18px;
        }

        /* Filter Drawer */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }

        .drawer {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            z-index: 1001;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .drawer.active {
            right: 0;
        }

        .drawer-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .drawer-content {
            padding: 20px;
            flex: 1;
        }

        .filter-group {
            margin-bottom: 25px;
        }

        .filter-group h4 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .filter-option {
            display: block;
            padding: 12px;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .filter-option:hover {
            background: #f0f0f0;
            border-color: #ff9900;
        }

        .filter-option.active {
            background: #fff7eb;
            border-color: #ff9900;
            color: #ff9900;
            font-weight: bold;
        }

        .product-card {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .price {
            color: #B12704;
            font-weight: bold;
        }

        button {
            background: #f0c14b;
            border: 1px solid #a88734;
            padding: 8px;
            width: 90%;
            margin: 5px 0;
            cursor: pointer;
        }

        .cart-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px;
            border-radius: 50%;
            background: #f0c14b;
            cursor: pointer;
        }

        .cart-box {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 260px;
            background: white;
            padding: 15px;
            display: none;
        }


        /* --- Full Screen Modal Styles --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            overflow-y: auto;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #333;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1;
        }

        .close-btn:hover {
            color: #ff9900;
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="products.html" class="back-btn">⬅</a>
        <h2>SMF SUPPLEMENTS</h2>
    </div>

    <h2>EAA</h2>

    <div class="controls-bar">
        <div class="control-group">
            <span id="productCount" style="font-weight: bold; color: #555;">3 Products found</span>
        </div>
        <div class="control-group">
            <button class="icon-btn" onclick="openDrawer()">
                <i data-lucide="sliders-horizontal"></i> Filter
            </button>
            <button class="icon-btn" id="viewToggleBtn" onclick="toggleView()">
                <i data-lucide="list"></i> List View
            </button>
        </div>
    </div>

    <!-- Filter Drawer -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="filterDrawer">
        <div class="drawer-header">
            <h3>Filters & Sorting</h3>
            <span style="cursor: pointer; font-size: 24px;" onclick="closeDrawer()">&times;</span>
        </div>
        <div class="drawer-content">
            <div class="filter-group">
                <h4>Sort By</h4>
                <div class="filter-option" onclick="applySort('low-high', this)">Price: Low to High</div>
                <div class="filter-option" onclick="applySort('high-low', this)">Price: High to Low</div>
                <div class="filter-option" onclick="applySort('name', this)">Name: A to Z</div>
            </div>
            <button onclick="closeDrawer()" style="width: 100%; margin-top: 20px; background: #232f3e; color: white;">Apply</button>
        </div>
    </div>

    <div class="grid">

        <!-- PRODUCTS -->
        <div class="product-card" onclick="openModal('Pre 1', 'img/eaa/51qPxZ5iU+L.webp', 1050, 'Enhanced amino acid profile for superior muscle recovery and intra-workout performance.')">
            <img src="img/eaa/51qPxZ5iU+L.webp">
            <div class="product-info">
                <h4>Pre 1</h4>
                <p class="price">₹1050</p>
                <button onclick="event.stopPropagation(); orderNow('Pre 1',1050)">Order</button>
                <button onclick="event.stopPropagation(); addToCart('Pre 1',1050)">Cart</button>
            </div>
        </div>

        <div class="product-card" onclick="openModal('Pre 2', 'img/eaa/51qPxZ5iU+L.webp', 1100, 'Advanced EAA formula to stimulate protein synthesis and reduce muscle soreness.')">
            <img src="img/eaa/51qPxZ5iU+L.webp">
            <div class="product-info">
                <h4>Pre 2</h4>
                <p class="price">₹1100</p>
                <button onclick="event.stopPropagation(); orderNow('Pre 2',1100)">Order</button>
                <button onclick="event.stopPropagation(); addToCart('Pre 2',1100)">Cart</button>
            </div>
        </div>

        <div class="product-card" onclick="openModal('Pre 3', 'img/eaa/51qPxZ5iU+L.webp', 1150, 'Full spectrum essential amino acids for total body health and recovery.')">
            <img src="img/eaa/51qPxZ5iU+L.webp">
            <div class="product-info">
                <h4>Pre 3</h4>
                <p class="price">₹1150</p>
                <button onclick="event.stopPropagation(); orderNow('Pre 3',1150)">Order</button>
                <button onclick="event.stopPropagation(); addToCart('Pre 3',1150)">Cart</button>
            </div>
        </div>

    </div>

    <!-- CART -->
    <div class="cart-btn" onclick="toggleCart()">🛒</div>

    <div class="cart-box" id="cartBox">
        <h3>Cart</h3>
        <div id="cartItems"></div>
        <h4>Total: ₹<span id="total">0</span></h4>
        <button onclick="sendCartWhatsApp()">Order Cart</button>
    </div>


        <script src="https://unpkg.com/lucide@latest"></script>
        <script>
            lucide.createIcons();

            const whatsappNumber = "917339563621";
            let cart = [];

            // View Toggle Logic
            function toggleView() {
                const grid = document.querySelector('.grid');
                const btn = document.getElementById('viewToggleBtn');
                grid.classList.toggle('list-view');
                
                if (grid.classList.contains('list-view')) {
                    btn.innerHTML = '<i data-lucide="grid"></i> Grid View';
                } else {
                    btn.innerHTML = '<i data-lucide="list"></i> List View';
                }
                lucide.createIcons();
            }

            // Drawer Logic
            function openDrawer() {
                document.getElementById('filterDrawer').classList.add('active');
                document.getElementById('drawerOverlay').style.display = 'block';
            }

            function closeDrawer() {
                document.getElementById('filterDrawer').classList.remove('active');
                document.getElementById('drawerOverlay').style.display = 'none';
            }

            // Sorting Logic
            function applySort(type, el) {
                // Update active state
                document.querySelectorAll('.filter-option').forEach(opt => opt.classList.remove('active'));
                if (el) el.classList.add('active');

                const grid = document.querySelector('.grid');
                const cards = Array.from(grid.querySelectorAll('.product-card'));

                cards.sort((a, b) => {
                    const priceA = parseInt(a.querySelector('.price').innerText.replace('₹', ''));
                    const priceB = parseInt(b.querySelector('.price').innerText.replace('₹', ''));
                    const nameA = a.querySelector('h4').innerText.toLowerCase();
                    const nameB = b.querySelector('h4').innerText.toLowerCase();

                    if (type === 'low-high') return priceA - priceB;
                    if (type === 'high-low') return priceB - priceA;
                    if (type === 'name') return nameA.localeCompare(nameB);
                    return 0;
                });

                // Clear and re-append
                cards.forEach(card => grid.appendChild(card));
                closeDrawer();
            }

            function orderNow(name, price) {
                window.location.href =
                    `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(
                        'Order:\n' + name + '\nPrice: ₹' + price)}`;
            }

            function addToCart(name, price) {
                cart.push({ name, price });
                renderCart();
            }

            function renderCart() {
                let total = 0;
                let html = "";
                cart.forEach((c, i) => {
                    total += c.price;
                    html += `${c.name} ₹${c.price} 
            <button onclick="removeItem(${i})">X</button><br>`;
                });
                document.getElementById("cartItems").innerHTML = html;
                document.getElementById("total").innerText = total;
            }

        function removeItem(i) {
            cart.splice(i, 1);
            renderCart();
        }

        function toggleCart() {
            let box = document.getElementById("cartBox");
            box.style.display = box.style.display === "block" ? "none" : "block";
        }

        function sendCartWhatsApp() {
            if (cart.length === 0) { alert("Cart empty"); return; }
            let msg = "Order:\n";
            let total = 0;

            cart.forEach(c => {
                msg += `${c.name} ₹${c.price}\n`;
                total += c.price;
            });

            msg += `Total: ₹${total}`;

            window.location.href =
                `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`;
        }


        /* --- Modal Logic --- */
        let currentModalProduct = {};

        function openModal(name, img, price, desc) {
            currentModalProduct = { name, img, price, desc };
            document.getElementById("modalImg").src = img;
            document.getElementById("modalName").innerText = name;
            document.getElementById("modalPrice").innerText = "Price: ₹" + price;
            document.getElementById("modalDesc").innerText = desc;
            
            // Set button actions
            document.getElementById("modalOrderBtn").onclick = () => orderNow(name, price);
            document.getElementById("modalCartBtn").onclick = () => addToCart(name, price);
            
            document.getElementById("productModal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("productModal").style.display = "none";
        }

        // Close on click outside
        window.onclick = function(event) {
            let modal = document.getElementById("productModal");
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="" alt="Product Image">
            <h2 id="modalName"></h2>
            <p id="modalPrice" class="price"></p>
            <p id="modalDesc" class="description" style="margin: 15px 0; color: #555; line-height: 1.6;"></p>
            <div class="modal-buttons">
                <button id="modalOrderBtn" style="background: #ff9900; border: none; color: black;">Order Now</button>
                <button id="modalCartBtn" style="background: #f0c14b; border: 1px solid #a88734; color: #111;">Add to Cart</button>
            </div>
        </div>
    </div>

</body>

</html>
