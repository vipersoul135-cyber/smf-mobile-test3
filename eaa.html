<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAA</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #808080;
            color: #111;
        }

        h2 {
            text-align: center;
            padding: 20px 0;
        }

        .navbar {
            background: #232f3e;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
        }

        .back-btn {
            color: #ff9900;
            text-decoration: none;
            font-size: 24px;
            margin-right: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        /* Responsive Grid */
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* List View Styles */
        .grid.list-view {
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
        }

        .grid.list-view .product-card {
            display: flex;
            flex-direction: row;
            align-items: center;
            text-align: left;
            padding: 20px;
            margin-bottom: 15px;
        }

        .grid.list-view .product-card img {
            width: 180px;
            height: 180px;
            margin-right: 25px;
            margin-bottom: 0;
        }

        .grid.list-view .product-card .product-info {
            flex: 1;
        }

        .grid.list-view .product-card button {
            width: auto;
            min-width: 120px;
            margin-right: 10px;
        }

        /* Controls Bar */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: #fff;
            margin: 10px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            background: #f5f5f5;
            border: 1px solid #ddd;
            color: #333;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.2s;
            width: auto;
        }

        .icon-btn:hover {
            background: #eee;
            border-color: #bbb;
        }

        .icon-btn i {
            width: 18px;
            height: 18px;
        }

        /* Filter Drawer */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }

        .drawer {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .drawer.active {
            right: 0;
        }

        .drawer-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .drawer-content {
            padding: 20px;
            flex: 1;
        }

        .filter-group {
            margin-bottom: 25px;
        }

        .filter-group h4 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .filter-option {
            display: block;
            padding: 12px;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .filter-option:hover {
            background: #f0f0f0;
            border-color: #ff9900;
        }

        .filter-option.active {
            background: #fff7eb;
            border-color: #ff9900;
            color: #ff9900;
            font-weight: bold;
        }

        .product-card {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .price {
            color: #B12704;
            font-weight: bold;
        }

        button {
            background: #f0c14b;
            border: 1px solid #a88734;
            padding: 8px;
            width: 90%;
            margin: 5px 0;
            cursor: pointer;
        }

        .cart-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px;
            border-radius: 50%;
            background: #f0c14b;
            cursor: pointer;
        }

        .cart-box {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 260px;
            background: white;
            padding: 15px;
            display: none;
        }


        /* --- Full Screen Modal Styles --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            overflow-y: auto;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 20px;
            transition: opacity 0.3s ease-in-out;
        }

        .modal-image-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.8);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slider-btn:hover {
            background: #fff;
            color: #ff9900;
        }

        .slider-btn.left {
            left: 10px;
        }

        .slider-btn.right {
            right: 10px;
        }

        .image-counter {
            position: absolute;
            bottom: 30px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            left: 50%;
            transform: translateX(-50%);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #333;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1;
        }

        .close-btn:hover {
            color: #ff9900;
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();

        const whatsappNumber = "917339563621";
        let cart = [];

        // View Toggle Logic
        function toggleView() {
            const grid = document.querySelector('.grid');
            const btn = document.getElementById('viewToggleBtn');
            grid.classList.toggle('list-view');

            if (grid.classList.contains('list-view')) {
                btn.innerHTML = '<i data-lucide="grid"></i> Grid View';
            } else {
                btn.innerHTML = '<i data-lucide="list"></i> List View';
            }
            lucide.createIcons();
        }

        // Drawer Logic
        function openDrawer() {
            document.getElementById('filterDrawer').classList.add('active');
            document.getElementById('drawerOverlay').style.display = 'block';
        }

        function closeDrawer() {
            document.getElementById('filterDrawer').classList.remove('active');
            document.getElementById('drawerOverlay').style.display = 'none';
        }

        // Sorting Logic
        function applySort(type, el) {
            // Update active state
            document.querySelectorAll('.filter-option').forEach(opt => opt.classList.remove('active'));
            if (el) el.classList.add('active');

            const grid = document.querySelector('.grid');
            const cards = Array.from(grid.querySelectorAll('.product-card'));

            cards.sort((a, b) => {
                const priceA = parseInt(a.querySelector('.price').innerText.replace('₹', ''));
                const priceB = parseInt(b.querySelector('.price').innerText.replace('₹', ''));
                const nameA = a.querySelector('h4').innerText.toLowerCase();
                const nameB = b.querySelector('h4').innerText.toLowerCase();

                if (type === 'low-high') return priceA - priceB;
                if (type === 'high-low') return priceB - priceA;
                if (type === 'name') return nameA.localeCompare(nameB);
                return 0;
            });

            // Clear and re-append
            cards.forEach(card => grid.appendChild(card));
            closeDrawer();
        }

        function orderNow(name, price) {
            window.location.href =
                `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(
                    'Order:\n' + name + '\nPrice: ₹' + price)}`;
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            renderCart();
        }

        function renderCart() {
            let total = 0;
            let html = "";
            cart.forEach((c, i) => {
                total += c.price;
                html += `${c.name} ₹${c.price} 
            <button onclick="removeItem(${i})">X</button><br>`;
            });
            document.getElementById("cartItems").innerHTML = html;
            document.getElementById("total").innerText = total;
        }

        function removeItem(i) {
            cart.splice(i, 1);
            renderCart();
        }

        function toggleCart() {
            let box = document.getElementById("cartBox");
            box.style.display = box.style.display === "block" ? "none" : "block";
        }

        function sendCartWhatsApp() {
            if (cart.length === 0) { alert("Cart empty"); return; }
            let msg = "Order:\n";
            let total = 0;

            cart.forEach(c => {
                msg += `${c.name} ₹${c.price}\n`;
                total += c.price;
            });

            msg += `Total: ₹${total}`;

            window.location.href =
                `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`;
        }


        /* --- Modal Logic --- */
        let currentModalProduct = {};
        let modalImages = [];
        let currentImageIndex = 0;

        function openModal(name, images, price, desc) {
            if (Array.isArray(images)) {
                modalImages = images;
            } else {
                modalImages = [images];
            }
            currentImageIndex = 0;
            currentModalProduct = { name, price, desc };

            updateModalImage();

            document.getElementById("modalName").innerText = name;
            document.getElementById("modalPrice").innerText = "Price: ₹" + price;
            document.getElementById("modalDesc").innerText = desc;

            // Set button actions
            document.getElementById("modalOrderBtn").onclick = () => orderNow(name, price);
            document.getElementById("modalCartBtn").onclick = () => addToCart(name, price);

            document.getElementById("productModal").style.display = "block";
        }

        function updateModalImage() {
            document.getElementById("modalImg").src = modalImages[currentImageIndex];
            document.getElementById("imageCounter").innerText = `${currentImageIndex + 1} / ${modalImages.length}`;

            const displayArrows = modalImages.length > 1 ? 'flex' : 'none';
            document.querySelectorAll('.slider-btn').forEach(btn => btn.style.display = displayArrows);
            document.getElementById("imageCounter").style.display = modalImages.length > 1 ? 'block' : 'none';
        }

        function changeImage(direction) {
            if (modalImages.length <= 1) return;
            currentImageIndex += direction;
            if (currentImageIndex < 0) currentImageIndex = modalImages.length - 1;
            if (currentImageIndex >= modalImages.length) currentImageIndex = 0;
            updateModalImage();
        }

        function closeModal() {
            document.getElementById("productModal").style.display = "none";
        }

        // Close on click outside
        window.onclick = function (event) {
            let modal = document.getElementById("productModal");
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-image-container">
                <button class="slider-btn left" onclick="changeImage(-1)">&#10094;</button>
                <img id="modalImg" src="" alt="Product Image">
                <button class="slider-btn right" onclick="changeImage(1)">&#10095;</button>
                <div class="image-counter" id="imageCounter">1 / 1</div>
            </div>
            <h2 id="modalName"></h2>
            <p id="modalPrice" class="price"></p>
            <p id="modalDesc" class="description" style="margin: 15px 0; color: #555; line-height: 1.6;"></p>
            <div class="modal-buttons">
                <button id="modalOrderBtn" style="background: #ff9900; border: none; color: black;">Order Now</button>
                <button id="modalCartBtn" style="background: #f0c14b; border: 1px solid #a88734; color: #111;">Add to
                    Cart</button>
            </div>
        </div>
    </div>

</body>

</html>
