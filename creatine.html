    <!-- Product Modal -->

            <div class="slider-container">
                <button class="slider-btn left" onclick="changeImage(-1)">&#10094;</button>
                <img id="modalImg" src="" alt="Product Detail">
                <button class="slider-btn right" onclick="changeImage(1)">&#10095;</button>
                <div id="imageCounter"
                    style="position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.5); color:#fff; padding:4px 8px; border-radius:10px; font-size:12px;">
                    1 / 1</div>
            </div>
            <h2 id="modalName"></h2>
            <p id="modalPrice" class="price"></p>
            <p id="modalDesc" style="margin: 15px 0; color: #555; font-size: 14px;"></p>
            <button class="btn-add" style="background:#ff9900"
                onclick="addToCart(currentProduct.name, currentProduct.price, currentProduct.images[0]); closeModal()">Add

        </div>
